# Dev override: hot-reload via volume mounts instead of built images.
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  server:
    build:
      target: builder
    command: >
      sh -c "npm run build:ts -w server &&
             node_modules/.bin/fastify start --ignore-watch=.ts$ -w -l info -o -P dist/src/app.js"
    working_dir: /app/server
    volumes:
      - ./server/src:/app/server/src:ro
      - ./shared:/app/shared:ro
      - sqlite_data:/app/data
    environment:
      DB_PATH: /app/data/todos.db
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}

  client:
    image: node:24-alpine
    working_dir: /app/client
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "${CLIENT_PORT:-5173}:5173"
    volumes:
      - ./client:/app/client:ro
      - ./shared:/app/shared:ro
      - /app/client/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      server:
        condition: service_healthy

volumes:
  sqlite_data:
